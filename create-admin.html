<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Admin</title>
  <style>
    body{font-family:Arial;padding:40px;background:#f5f7fb}
    .box{max-width:420px;margin:auto;background:#fff;padding:24px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    input,button{width:100%;padding:12px;margin-top:12px}
    button{background:#2563eb;color:#fff;border:none;border-radius:8px}
    #msg{margin-top:12px;white-space:pre-wrap}
  </style>
</head>
<body>
  <div class="box">
    <h2>Create Admin</h2>
    <input id="email" type="email" value="richardelia105@gmail.com" />
    <input id="password" type="password" placeholder="Password mpya" />
    <button onclick="createAdmin()">Create Admin</button>
    <p id="msg"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    async function createAdmin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('msg');
      msg.textContent = 'Creating...';

      const { data, error } = await supabaseClient.auth.signUp({ email, password });

      if (error) {
        msg.textContent = 'SIGNUP ERROR: ' + error.message;
        console.error(error);
        return;
      }

      const userId = data?.user?.id;
      if (!userId) {
        msg.textContent = 'User created but no user ID returned.';
        console.log(data);
        return;
      }

      const { error: profileError } = await supabaseClient
        .from('admin_profiles')
        .insert([{ id: userId, email, role: 'admin' }]);

      if (profileError) {
        msg.textContent = 'ADMIN PROFILE ERROR: ' + profileError.message + '\\nUSER ID: ' + userId;
        console.error(profileError);
        return;
      }

      msg.textContent = 'SUCCESS\\nUser ID: ' + userId;
    }
  </script>
</body>
</html>
