<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PDF Page Counter – Count Pages in PDF Online</title><meta name="description" content="Count total pages in a PDF file online."><link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><script async src="https://www.googletagmanager.com/gtag/js?id=G-S4TXSS26TQ"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-S4TXSS26TQ');</script></head><body><div class="toolbox"><div class="tool-icon"><i class="fa-solid fa-list-ol"></i></div><h1>PDF Page Counter – Count Pages in PDF Online</h1><p class="desc">Count total pages in a PDF file online.</p><div class="upload">Upload a PDF file to count pages</div><input class="input" id="file" type="file" accept="application/pdf"><div class="toolbar"><button class="toolbtn" onclick="countPages()">Count Pages</button></div><div id="result" class="result">Upload a PDF file.</div><a class="back" href="../index.html"><i class="fa-solid fa-arrow-left"></i> Back to SmartTools</a></div><script src="../js/helpers.js"></script><script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script><script>async function countPages(){const file=byId('file').files[0];if(!file){byId('result').innerText='Choose a PDF file';return;}const pdf=await PDFLib.PDFDocument.load(await file.arrayBuffer());byId('result').innerText=`Pages: ${pdf.getPageCount()}`;}</script></body></html>
