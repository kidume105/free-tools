<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Meta Tag Generator – Generate SEO Meta Tags Free</title><meta name="description" content="Generate title, description and keywords tags."><link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><script async src="https://www.googletagmanager.com/gtag/js?id=G-S4TXSS26TQ"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-S4TXSS26TQ');</script></head><body><div class="toolbox"><div class="tool-icon"><i class="fa-solid fa-tags"></i></div><h1>Meta Tag Generator – Generate SEO Meta Tags Free</h1><p class="desc">Generate title, description and keywords tags.</p><input class="input" id="title" placeholder="Page title"><input class="input" id="desc" placeholder="Meta description"><input class="input" id="keywords" placeholder="Keywords, comma separated"><div class="toolbar"><button class="toolbtn" onclick="buildTags()">Generate</button><button class="toolbtn secondary" onclick="copyText(byId('result').innerText)">Copy</button></div><pre id="result" class="result"></pre><a class="back" href="../index.html"><i class="fa-solid fa-arrow-left"></i> Back to SmartTools</a></div><script src="../js/helpers.js"></script><script>function buildTags(){const t=byId('title').value.trim(),d=byId('desc').value.trim(),k=byId('keywords').value.trim();byId('result').innerText=`<title>${t}</title>\n<meta name="description" content="${d}">\n<meta name="keywords" content="${k}">`;}</script></body></html>
