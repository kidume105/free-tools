<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Split PDF | SmartTools</title><meta name="description" content="Extract selected pages from a PDF file."><link rel="stylesheet" href="../css/style.css"></head><body><div class="section"><div class="toolbox"><h1>Split PDF</h1><p class="desc">Extract selected pages from a PDF file.</p><div class="upload-zone">Upload a PDF and choose pages like 1,3,5</div><input class="input" id="file" type="file" accept="application/pdf"><input class="input" id="pages" placeholder="Pages like: 1,3,5"><div class="toolbar"><button class="toolbtn" onclick="splitPdf()">Split PDF</button></div><div id="result" class="result">Upload a PDF and enter page numbers.</div><a class="back" href="../index.html">← Back to SmartTools</a></div></div><script src="../js/helpers.js"></script><script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script><script>async function splitPdf(){const file=byId('file').files[0];const raw=byId('pages').value.trim();if(!file||!raw){byId('result').innerText='Upload a PDF and enter page numbers';return;}const src=await PDFLib.PDFDocument.load(await file.arrayBuffer());const wanted=raw.split(',').map(v=>parseInt(v.trim(),10)-1).filter(v=>Number.isInteger(v)&&v>=0&&v<src.getPageCount());if(!wanted.length){byId('result').innerText='No valid page numbers';return;}const out=await PDFLib.PDFDocument.create();const copied=await out.copyPages(src,wanted);copied.forEach(p=>out.addPage(p));const bytes=await out.save();const blob=new Blob([bytes],{type:'application/pdf'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='split-pages.pdf';a.click();byId('result').innerText='Split PDF downloaded.';}</script></body></html>
