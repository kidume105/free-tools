<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Image Resizer | SmartTools</title><meta name="description" content="Resize images and save the new version."><link rel="stylesheet" href="../css/style.css"></head><body><div class="section"><div class="toolbox"><h1>Image Resizer</h1><p class="desc">Resize images and save the new version.</p><div class="upload-zone">Upload image to resize</div><input class="input" id="file" type="file" accept="image/*"><div class="row"><input class="input" id="width" type="number" placeholder="Width in px"><input class="input" id="height" type="number" placeholder="Height in px (optional)"></div><div class="toolbar"><button class="toolbtn" onclick="resizeImg()">Resize</button><button class="toolbtn secondary" onclick="downloadCanvas(byId('canvas'),'resized.png')">Download</button></div><canvas id="canvas"></canvas><a class="back" href="../index.html">← Back to SmartTools</a></div></div><script src="../js/helpers.js"></script><script>let src;byId('file').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;src=new Image();src.src=URL.createObjectURL(f);});function resizeImg(){if(!src){alert('Upload image first');return;}let w=parseInt(byId('width').value||'0'),h=parseInt(byId('height').value||'0');if(!w&&!h){w=src.width;h=src.height;}if(w&&!h)h=Math.round(src.height*(w/src.width));if(h&&!w)w=Math.round(src.width*(h/src.height));const c=byId('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(src,0,0,w,h);}</script></body></html>
