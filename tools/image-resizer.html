<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Image Resizer – Resize Images Online Free</title><meta name="description" content="Resize images online and download the result."><link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><script async src="https://www.googletagmanager.com/gtag/js?id=G-S4TXSS26TQ"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-S4TXSS26TQ');</script></head><body><div class="toolbox"><div class="tool-icon"><i class="fa-solid fa-expand"></i></div><h1>Image Resizer – Resize Images Online Free</h1><p class="desc">Resize images online and download the result.</p><div class="upload">Upload image to resize</div><input class="input" id="file" type="file" accept="image/*"><div class="row"><input class="input" id="width" type="number" placeholder="Width in px"><input class="input" id="height" type="number" placeholder="Height in px (optional)"></div><div class="toolbar"><button class="toolbtn" onclick="resizeImg()">Resize</button><button class="toolbtn secondary" onclick="downloadCanvas(byId('canvas'),'resized.png')">Download</button></div><canvas id="canvas"></canvas><a class="back" href="../index.html"><i class="fa-solid fa-arrow-left"></i> Back to SmartTools</a></div><script src="../js/helpers.js"></script><script>let src;byId('file').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;src=new Image();src.src=URL.createObjectURL(f);});function resizeImg(){if(!src){alert('Upload image first');return;}let w=parseInt(byId('width').value||'0'),h=parseInt(byId('height').value||'0');if(!w&&!h){w=src.width;h=src.height;}if(w&&!h)h=Math.round(src.height*(w/src.width));if(h&&!w)w=Math.round(src.width*(h/src.height));const c=byId('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(src,0,0,w,h);}</script></body></html>
