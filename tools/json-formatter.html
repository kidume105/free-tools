<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-S4TXSS26TQ');</script></head><body><div class="toolbox"><div class="tool-icon"><i class="fa-solid fa-code"></i></div><h1>JSON Formatter – Beautify and Validate JSON Online</h1><p class="desc">Beautify, validate and minify JSON quickly.</p><textarea id="input"></textarea><div class="toolbar"><button class="toolbtn" onclick="beautify()">Beautify</button><button class="toolbtn secondary" onclick="minify()">Minify</button></div><pre id="result" class="result"></pre><a class="back" href="../index.html"><i class="fa-solid fa-arrow-left"></i> Back to SmartTools</a></div><script src="../js/helpers.js"></script><script>function beautify(){try{byId('result').innerText=JSON.stringify(JSON.parse(byId('input').value),null,2);}catch(e){byId('result').innerText='Invalid JSON';}}function minify(){try{byId('result').innerText=JSON.stringify(JSON.parse(byId('input').value));}catch(e){byId('result').innerText='Invalid JSON';}}</script></body></html>
