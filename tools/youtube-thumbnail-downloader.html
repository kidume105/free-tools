<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>YouTube Thumbnail Downloader | SmartTools</title><meta name="description" content="Extract and download YouTube thumbnail images."><link rel="stylesheet" href="../css/style.css"></head><body><div class="section"><div class="toolbox"><h1>YouTube Thumbnail Downloader</h1><p class="desc">Extract and download YouTube thumbnail images.</p><input class="input" id="url" placeholder="Paste YouTube URL"><div class="toolbar"><button class="toolbtn" onclick="run()">Get Thumbnail</button></div><div id="wrap"></div><div class="note">This gets the thumbnail image only, not the video file.</div><a class="back" href="../index.html">← Back to SmartTools</a></div></div><script src="../js/helpers.js"></script><script>function getId(u){try{const url=new URL(u);if(url.hostname.includes('youtu.be'))return url.pathname.slice(1);if(url.searchParams.get('v'))return url.searchParams.get('v');const m=u.match(/embed\/([a-zA-Z0-9_-]{6,})/);return m?m[1]:'';}catch(e){const m=u.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{6,})/);return m?m[1]:'';}}function run(){const id=getId(byId('url').value.trim());if(!id){byId('wrap').innerHTML='<div class="result">Invalid YouTube URL</div>';return;}const img=`https://img.youtube.com/vi/${id}/maxresdefault.jpg`;const fallback=`https://img.youtube.com/vi/${id}/hqdefault.jpg`;byId('wrap').innerHTML=`<img class="preview" src="${img}" onerror="this.src='${fallback}'"><div class="toolbar"><a class="toolbtn secondary" href="${img}" download="youtube-thumbnail.jpg">Download Thumbnail</a></div>`;}</script></body></html>
