<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>BMI Calculator – Body Mass Index Calculator Online</title><meta name="description" content="Calculate body mass index online."><link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><script async src="https://www.googletagmanager.com/gtag/js?id=G-S4TXSS26TQ"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-S4TXSS26TQ');</script></head><body><div class="toolbox"><div class="tool-icon"><i class="fa-solid fa-scale-balanced"></i></div><h1>BMI Calculator – Body Mass Index Calculator Online</h1><p class="desc">Calculate body mass index online.</p><div class="row"><input class="input" id="weight" type="number" placeholder="Weight in kg"><input class="input" id="height" type="number" placeholder="Height in cm"></div><div class="toolbar"><button class="toolbtn" onclick="calc()">Calculate</button></div><div id="result" class="result"></div><a class="back" href="../index.html"><i class="fa-solid fa-arrow-left"></i> Back to SmartTools</a></div><script src="../js/helpers.js"></script><script>function calc(){const w=parseFloat(byId('weight').value),h=parseFloat(byId('height').value)/100;if(!w||!h){byId('result').innerText='Enter valid values';return;}const bmi=w/(h*h);const label=bmi<18.5?'Underweight':bmi<25?'Normal':bmi<30?'Overweight':'Obese';byId('result').innerText=`BMI: ${bmi.toFixed(2)} (${label})`;}</script></body></html>
