<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Slug Generator – Create SEO Friendly URLs Online</title><meta name="description" content="Create SEO friendly slugs from blog titles and headings."><link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><script async src="https://www.googletagmanager.com/gtag/js?id=G-S4TXSS26TQ"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-S4TXSS26TQ');</script></head><body><div class="toolbox"><div class="tool-icon"><i class="fa-solid fa-link"></i></div><h1>Slug Generator – Create SEO Friendly URLs Online</h1><p class="desc">Create SEO friendly slugs from blog titles and headings.</p><input class="input" id="input" placeholder="Enter page title"><div class="toolbar"><button class="toolbtn" onclick="makeSlug()">Generate Slug</button><button class="toolbtn secondary" onclick="copyText(byId('result').innerText)">Copy</button></div><div id="result" class="result"></div><a class="back" href="../index.html"><i class="fa-solid fa-arrow-left"></i> Back to SmartTools</a></div><script src="../js/helpers.js"></script><script>function makeSlug(){const s=byId('input').value.toLowerCase().trim().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-');byId('result').innerText=s;}byId('input').addEventListener('input', makeSlug);</script></body></html>
