<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Invoice Generator | SmartTools</title><meta name="description" content="Generate a simple printable invoice."><link rel="stylesheet" href="../css/style.css"></head><body><div class="section"><div class="toolbox"><h1>Invoice Generator</h1><p class="desc">Generate a simple printable invoice.</p><div class="row"><input class="input" id="biz" placeholder="Business name"><input class="input" id="client" placeholder="Client name"></div><div class="row"><input class="input" id="item" placeholder="Item or service"><input class="input" id="amount" type="number" placeholder="Amount"></div><input class="input" id="date" type="date"><div class="toolbar"><button class="toolbtn" onclick="build()">Generate Invoice</button><button class="toolbtn secondary" onclick="window.print()">Print</button></div><div id="invoice" class="result"></div><a class="back" href="../index.html">← Back to SmartTools</a></div></div><script src="../js/helpers.js"></script><script>function build(){const biz=byId('biz').value||'Your Business';const client=byId('client').value||'Client';const item=byId('item').value||'Service';const amount=parseFloat(byId('amount').value||'0').toFixed(2);const date=byId('date').value||new Date().toISOString().slice(0,10);byId('invoice').innerText=`INVOICE\n\nBusiness: ${biz}\nClient: ${client}\nDate: ${date}\nItem: ${item}\nAmount: $${amount}`;}</script></body></html>
