<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Case Converter – Uppercase Lowercase Title Case Tool</title><meta name="description" content="Convert text to uppercase, lowercase, title case and sentence case with this free tool."><link rel="stylesheet" href="../css/style.css"><script async src="https://www.googletagmanager.com/gtag/js?id=G-S4TXSS26TQ"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-S4TXSS26TQ');
</script></head><body><div class="section"><div class="toolbox"><h1>Case Converter – Uppercase Lowercase Title Case Tool</h1><p class="desc">Convert text to uppercase, lowercase, title case and sentence case with this free tool.</p><textarea id="input"></textarea><div class="toolbar"><button class="toolbtn" onclick="convertCase('upper')">UPPER</button><button class="toolbtn" onclick="convertCase('lower')">lower</button><button class="toolbtn" onclick="convertCase('title')">Title</button><button class="toolbtn" onclick="convertCase('sentence')">Sentence</button></div><div id="result" class="result"></div><a class="back" href="../index.html">← Back to SmartTools</a></div></div><script src="../js/helpers.js"></script><script>function titleCase(s){return s.toLowerCase().replace(/\b\w/g,m=>m.toUpperCase());}function sentenceCase(s){return s.toLowerCase().replace(/(^\s*[a-z])|([.!?]\s*[a-z])/g,m=>m.toUpperCase());}function convertCase(type){let t=byId('input').value;if(type==='upper')t=t.toUpperCase();if(type==='lower')t=t.toLowerCase();if(type==='title')t=titleCase(t);if(type==='sentence')t=sentenceCase(t);byId('result').innerText=t;}</script></body></html>
