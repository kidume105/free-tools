<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Color Picker From Image – Extract HEX and RGB Colors</title><meta name="description" content="Extract HEX and RGB colors from images online."><link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><script async src="https://www.googletagmanager.com/gtag/js?id=G-S4TXSS26TQ"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-S4TXSS26TQ');</script></head><body><div class="toolbox"><div class="tool-icon"><i class="fa-solid fa-eye-dropper"></i></div><h1>Color Picker From Image – Extract HEX and RGB Colors</h1><p class="desc">Extract HEX and RGB colors from images online.</p><div class="upload">Upload image and click any point</div><input class="input" id="file" type="file" accept="image/*"><canvas id="canvas"></canvas><div id="result" class="result">Upload image and click on any point.</div><a class="back" href="../index.html"><i class="fa-solid fa-arrow-left"></i> Back to SmartTools</a></div><script src="../js/helpers.js"></script><script>const canvas=byId('canvas'),ctx=canvas.getContext('2d');byId('file').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const img=new Image();img.onload=()=>{const scale=Math.min(700/img.width,480/img.height,1);canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);ctx.drawImage(img,0,0,canvas.width,canvas.height)};img.src=URL.createObjectURL(f);});canvas.addEventListener('click',e=>{const rect=canvas.getBoundingClientRect();const x=Math.floor(e.clientX-rect.left),y=Math.floor(e.clientY-rect.top);const d=ctx.getImageData(x,y,1,1).data;const hex='#'+[d[0],d[1],d[2]].map(v=>v.toString(16).padStart(2,'0')).join('');byId('result').innerText=`HEX: ${hex} | RGB: ${d[0]}, ${d[1]}, ${d[2]}`;});</script></body></html>
