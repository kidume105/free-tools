<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Loan Calculator – Monthly Loan Repayment Calculator</title><meta name="description" content="Estimate monthly loan payments and total repayment."><link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><script async src="https://www.googletagmanager.com/gtag/js?id=G-S4TXSS26TQ"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-S4TXSS26TQ');</script></head><body><div class="toolbox"><div class="tool-icon"><i class="fa-solid fa-money-bill-wave"></i></div><h1>Loan Calculator – Monthly Loan Repayment Calculator</h1><p class="desc">Estimate monthly loan payments and total repayment.</p><div class="row"><input class="input" id="amount" type="number" placeholder="Loan amount"><input class="input" id="rate" type="number" placeholder="Annual interest %"></div><input class="input" id="months" type="number" placeholder="Months"><div class="toolbar"><button class="toolbtn" onclick="calc()">Calculate</button></div><div id="result" class="result"></div><a class="back" href="../index.html"><i class="fa-solid fa-arrow-left"></i> Back to SmartTools</a></div><script src="../js/helpers.js"></script><script>function calc(){const P=parseFloat(byId('amount').value),annual=parseFloat(byId('rate').value),n=parseInt(byId('months').value);if(!P||!isFinite(annual)||!n){byId('result').innerText='Enter valid values';return;}const r=annual/100/12;const m=r===0?P/n:(P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);byId('result').innerText=`Estimated monthly payment: ${m.toFixed(2)}\nTotal repayment: ${(m*n).toFixed(2)}`;}</script></body></html>
