<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Image Compressor | SmartTools</title><meta name="description" content="Compress images in-browser and download JPG."><link rel="stylesheet" href="../css/style.css"></head><body><div class="section"><div class="toolbox"><h1>Image Compressor</h1><p class="desc">Compress images in-browser and download JPG.</p><div class="upload-zone">Upload image to compress</div><input class="input" id="file" type="file" accept="image/*"><div class="row"><input class="input" id="quality" type="number" min="0.1" max="1" step="0.1" value="0.7"><input class="input" id="width" type="number" placeholder="Optional resize width"></div><div class="toolbar"><button class="toolbtn" onclick="compress()">Compress</button><button class="toolbtn secondary" onclick="downloadOut()">Download JPG</button></div><canvas id="canvas"></canvas><div id="info" class="result"></div><a class="back" href="../index.html">← Back to SmartTools</a></div></div><script src="../js/helpers.js"></script><script>let img,file,out='';byId('file').addEventListener('change',e=>{file=e.target.files[0];if(!file)return;img=new Image();img.src=URL.createObjectURL(file);});function compress(){if(!img){alert('Upload image first');return;}const q=Math.max(0.1,Math.min(1,parseFloat(byId('quality').value||'0.7')));let w=parseInt(byId('width').value||'0'),h=0;if(w){h=Math.round(img.height*(w/img.width));}else{w=img.width;h=img.height;}const c=byId('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);out=c.toDataURL('image/jpeg',q);byId('info').innerText=`Original: ${(file.size/1024).toFixed(1)} KB`; }function downloadOut(){if(!out){alert('Compress first');return;}const a=document.createElement('a');a.href=out;a.download='compressed.jpg';a.click();}</script></body></html>
