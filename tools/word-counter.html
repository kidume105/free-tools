
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word Counter</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="container">
<div class="toolbox">

<h2>Word Counter</h2>


<textarea id="t"></textarea>
<button onclick="run()">Count</button>
<div id="r" class="result"></div>
<script>
function run(){
let t=document.getElementById('t').value;
let w=t.trim().split(/\s+/).filter(x=>x).length;
let c=t.length;
document.getElementById('r').innerText="Words: "+w+" | Characters: "+c;
}
</script>


<br>
<a href="../index.html">Back</a>

</div>
</div>

</body>
</html>
