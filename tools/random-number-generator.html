<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Random Number Generator – Generate Random Numbers Online</title><meta name="description" content="Generate random numbers in any range."><link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><script async src="https://www.googletagmanager.com/gtag/js?id=G-S4TXSS26TQ"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-S4TXSS26TQ');</script></head><body><div class="toolbox"><div class="tool-icon"><i class="fa-solid fa-dice"></i></div><h1>Random Number Generator – Generate Random Numbers Online</h1><p class="desc">Generate random numbers in any range.</p><div class="row"><input class="input" id="min" type="number" value="1"><input class="input" id="max" type="number" value="100"></div><div class="toolbar"><button class="toolbtn" onclick="run()">Generate</button></div><div id="result" class="result"></div><a class="back" href="../index.html"><i class="fa-solid fa-arrow-left"></i> Back to SmartTools</a></div><script src="../js/helpers.js"></script><script>function run(){let min=parseInt(byId('min').value||'1'),max=parseInt(byId('max').value||'100');if(max<min){const t=min;min=max;max=t;}byId('result').innerText=String(Math.floor(Math.random()*(max-min+1))+min);}run();</script></body></html>
