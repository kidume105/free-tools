<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>QR Code Generator – Create QR Codes Online Free</title><meta name="description" content="Create QR codes online from links, text or any URL."><link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><script async src="https://www.googletagmanager.com/gtag/js?id=G-S4TXSS26TQ"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-S4TXSS26TQ');</script></head><body><div class="toolbox"><div class="tool-icon"><i class="fa-solid fa-qrcode"></i></div><h1>QR Code Generator – Create QR Codes Online Free</h1><p class="desc">Create QR codes online from links, text or any URL.</p><input class="input" id="input" placeholder="Enter text or URL"><div class="toolbar"><button class="toolbtn" onclick="run()">Generate QR</button></div><div id="wrap"></div><div class="note">This tool uses an external QR image service to render the QR code.</div><a class="back" href="../index.html"><i class="fa-solid fa-arrow-left"></i> Back to SmartTools</a></div><script src="../js/helpers.js"></script><script>function run(){const v=byId('input').value.trim();if(!v){byId('wrap').innerHTML='';return;}const url='https://api.qrserver.com/v1/create-qr-code/?size=260x260&data='+encodeURIComponent(v);byId('wrap').innerHTML=`<img class="preview" src="${url}"><div class="toolbar"><a class="toolbtn secondary" href="${url}" download="qr-code.png">Download</a></div>`;}</script></body></html>
