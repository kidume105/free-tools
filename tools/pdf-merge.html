<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Merge PDF | SmartTools</title><meta name="description" content="Merge multiple PDF files into one document."><link rel="stylesheet" href="../css/style.css"></head><body><div class="section"><div class="toolbox"><h1>Merge PDF</h1><p class="desc">Merge multiple PDF files into one document.</p><div class="upload-zone">Upload at least two PDF files to merge</div><input class="input" id="files" type="file" accept="application/pdf" multiple><div class="toolbar"><button class="toolbtn" onclick="mergePdfs()">Merge PDFs</button></div><div id="result" class="result">Choose at least 2 PDFs.</div><a class="back" href="../index.html">← Back to SmartTools</a></div></div><script src="../js/helpers.js"></script><script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script><script>async function mergePdfs(){const files=[...byId('files').files];if(files.length<2){byId('result').innerText='Please choose at least 2 PDFs';return;}const out=await PDFLib.PDFDocument.create();for(const f of files){const src=await PDFLib.PDFDocument.load(await f.arrayBuffer());const copied=await out.copyPages(src,src.getPageIndices());copied.forEach(p=>out.addPage(p));}const bytes=await out.save();const blob=new Blob([bytes],{type:'application/pdf'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='merged.pdf';a.click();byId('result').innerText='Merged PDF downloaded.';}</script></body></html>
