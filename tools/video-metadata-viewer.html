<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Video Metadata Viewer | SmartTools</title><meta name="description" content="See video duration, size and resolution."><link rel="stylesheet" href="../css/style.css"></head><body><div class="section"><div class="toolbox"><h1>Video Metadata Viewer</h1><p class="desc">See video duration, size and resolution.</p><div class="upload-zone">Upload video to inspect metadata</div><input class="input" id="file" type="file" accept="video/*"><div id="result" class="result">Upload a video file.</div><a class="back" href="../index.html">← Back to SmartTools</a></div></div><script src="../js/helpers.js"></script><script>byId('file').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const v=document.createElement('video');v.preload='metadata';v.onloadedmetadata=()=>{byId('result').innerText=`Name: ${f.name}\nSize: ${(f.size/1024/1024).toFixed(2)} MB\nDuration: ${v.duration.toFixed(2)} sec\nResolution: ${v.videoWidth} x ${v.videoHeight}`;};v.src=URL.createObjectURL(f);});</script></body></html>
