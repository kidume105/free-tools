<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Video Metadata Viewer – Check Video Duration and Resolution</title><meta name="description" content="Check video duration, size and resolution online."><link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><script async src="https://www.googletagmanager.com/gtag/js?id=G-S4TXSS26TQ"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-S4TXSS26TQ');</script></head><body><div class="toolbox"><div class="tool-icon"><i class="fa-solid fa-video"></i></div><h1>Video Metadata Viewer – Check Video Duration and Resolution</h1><p class="desc">Check video duration, size and resolution online.</p><div class="upload">Upload video to inspect metadata</div><input class="input" id="file" type="file" accept="video/*"><div id="result" class="result">Upload a video file.</div><a class="back" href="../index.html"><i class="fa-solid fa-arrow-left"></i> Back to SmartTools</a></div><script src="../js/helpers.js"></script><script>byId('file').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const v=document.createElement('video');v.preload='metadata';v.onloadedmetadata=()=>{byId('result').innerText=`Name: ${f.name}\nSize: ${(f.size/1024/1024).toFixed(2)} MB\nDuration: ${v.duration.toFixed(2)} sec\nResolution: ${v.videoWidth} x ${v.videoHeight}`;};v.src=URL.createObjectURL(f);});</script></body></html>
