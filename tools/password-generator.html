<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Password Generator – Generate Strong Passwords Free</title><meta name="description" content="Generate secure passwords with copy and download."><link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><script async src="https://www.googletagmanager.com/gtag/js?id=G-S4TXSS26TQ"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-S4TXSS26TQ');</script></head><body><div class="toolbox"><div class="tool-icon"><i class="fa-solid fa-key"></i></div><h1>Password Generator – Generate Strong Passwords Free</h1><p class="desc">Generate secure passwords with copy and download.</p><div class="row"><input class="input" id="len" type="number" min="4" max="64" value="16"><select class="input" id="symbols"><option value="yes">Include symbols</option><option value="no">No symbols</option></select></div><div class="toolbar"><button class="toolbtn" onclick="gen()">Generate</button><button class="toolbtn secondary" onclick="copyText(byId('result').innerText)">Copy</button><button class="toolbtn secondary" onclick="downloadText('password.txt', byId('result').innerText)">Download</button></div><div id="result" class="result"></div><a class="back" href="../index.html"><i class="fa-solid fa-arrow-left"></i> Back to SmartTools</a></div><script src="../js/helpers.js"></script><script>function gen(){const len=Math.max(4,Math.min(64,parseInt(byId('len').value||'16')));const chars='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';const sy='!@#$%^&*()_+-={}[]<>?';const pool=byId('symbols').value==='yes'?chars+sy:chars;const arr=new Uint32Array(len);crypto.getRandomValues(arr);let out='';arr.forEach(n=>out+=pool[n%pool.length]);byId('result').innerText=out;}gen();</script></body></html>
